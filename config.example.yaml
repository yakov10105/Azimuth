neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  # password: set via NEO4J_PASSWORD env var (required)

qdrant:
  url: http://localhost:6333

postgres:
  # dsn: set via POSTGRES_DSN env var (required)
  # e.g. postgresql://azimuth:pass@localhost:5432/azimuth

llm:
  model: claude-sonnet-4-6
  # anthropic_api_key: set via ANTHROPIC_API_KEY env var (required)

app:
  log_level: info                      # debug | info | warn | error
  worker_pool_size: 8
  graph_walker_depth: 3
  embedding_model: text-embedding-3-large
  embedding_batch_size: 100
  neo4j_write_batch_size: 500
  # target_repo_path: /path/to/repo   # or pass as CLI arg to azimuth ingest
